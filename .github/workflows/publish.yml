name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target repository"
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi
      run_tests:
        description: "Run test suite before publish"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    if: github.event_name == 'workflow_dispatch' && github.repository == 'NetSPI/oci-lexer-parser' && github.actor == 'WebbinRoot'
    runs-on: ubuntu-latest
    environment: ${{ inputs.repository }}
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        # v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: |
          python -m pip install .[dev]
          python -m pytest -q -m "not generate_json"

      - name: Build dist
        run: python -m build

      - name: Publish to PyPI
        if: ${{ inputs.repository == 'pypi' }}
        # v 1.14.0
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

      - name: Publish to TestPyPI
        if: ${{ inputs.repository == 'testpypi' }}
        # v1.14.0
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/
